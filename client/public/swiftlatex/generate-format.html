<!doctype html>
<html>
  <body>
    <button id="run">generate format</button>
    <pre id="log"></pre>
    <script src="/swiftlatex/PdfTeXEngine.js"></script>
    <script>
      const log = document.getElementById('log');
      document.getElementById('run').addEventListener('click', async () => {
        try {
          const engine = new window.PdfTeXEngine();
          await engine.loadEngine();
          engine.setTexliveEndpoint(`${location.origin}/api/swiftlatex`);
          const result = await engine.compileFormat();
          log.textContent = `status=${result.status}\nbytes=${result.format.length}\n${result.log}`;
          log.textContent += '\nUploading generated format...';
          const response = await fetch('/api/swiftlatex/pdftex/10/swiftlatexpdftex.fmt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/octet-stream' },
            body: result.format,
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'upload failed');
          log.textContent += `\nSaved to server: ${payload.bytes} bytes`;
        } catch (err) {
          log.textContent = String(err);
        }
      });
    </script>
  </body>
</html>
